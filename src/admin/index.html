<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <!--
    No styles or other scripts needed here.
    Sveltia CMS is a fully self-contained single-page app —
    the script tag below loads everything (the UI, the editor,
    the GitHub connection logic). It takes over the entire page.
  -->
</head>
<body>
  <!--
    This loads Sveltia CMS directly from a CDN (unpkg).
    No npm install needed for the CMS itself — it runs purely
    in the browser. When your friend visits /admin/, this script
    boots up the full CMS interface.

    Note: if you ever need to pin a specific version (e.g. for
    stability across client sites), you can change the URL to:
    https://unpkg.com/@sveltia/cms@X.X.X/dist/sveltia-cms.js
    Check https://github.com/sveltia/sveltia-cms for latest version.
  -->
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</body>
</html>
