# ============================================================
# PAPPACE PLACE LEARNING STUDIO — CMS Configuration
# src/admin/config.yml
#
# This file controls what your friend sees and can edit
# in the Sveltia CMS admin portal at /admin/.
#
# HOW IT WORKS:
# - "collections" defines the editable sections
# - Each "field" maps to a key in src/_data/home.json
# - When your friend saves a change in the CMS, Sveltia
#   commits the updated home.json directly to GitHub,
#   which triggers a fresh Cloudflare Pages build
#   automatically — the live site updates in ~30 seconds
#
# WIDGET TYPES USED HERE:
# - string  = single line text input
# - text    = multi-line text area (no formatting)
# - image   = file upload picker (saves to media_folder)
# - list    = repeatable group of fields (cards, items)
#
# TO ADD A NEW FIELD:
# 1. Add the field here under the right section
# 2. Add the matching key to src/_data/home.json
# 3. Reference it in index.njk with {{ home.your_key }}
# ============================================================


# ============================================================
# BACKEND — where content is stored and how the CMS logs in.
# "github" means all edits commit directly to your GitHub
# repo as real files. No separate database, no vendor lock-in.
# Everything lives in Git alongside your code.
# ============================================================
backend:
  name: github                           # use GitHub as the content store
  repo: marias-learning/pappaceplace3   # your GitHub repo
  branch: main                           # edits commit to this branch

  # The Cloudflare Worker that handles GitHub OAuth login.
  # This is the worker you deployed in Phase 4 — it lets
  # your friend log in with "Login with GitHub" instead of
  # managing personal access tokens.
  base_url: https://sveltia-cms-auth.maria-b19.workers.dev


# ============================================================
# MEDIA — controls where uploaded images are stored.
#
# media_folder: where Sveltia saves uploaded files in the repo
# public_folder: the URL path written into content fields
#   e.g. an uploaded file becomes /images/uploads/photo.jpg
#   in the built site
# ============================================================
media_folder: "src/images/uploads"
public_folder: "/images/uploads"


# ============================================================
# COLLECTIONS — the editable content sections in the CMS.
#
# This site uses a single "files" collection (as opposed to
# a "folder" collection which would be for blog posts etc).
# "files" = a fixed set of named files, perfect for a
# one-page site where every section is always present.
# ============================================================
collections:
  - name: "pages"
    label: "Site Content"
    files:

      # ----------------------------------------------------------
      # HOME PAGE
      # Maps to: src/_data/home.json
      # Every field below corresponds to a key in that file.
      # ----------------------------------------------------------
      - name: "home"
        label: "Home Page"
        file: "src/_data/home.json"
        fields:


          # ── SEO ───────────────────────────────────────────────
          # Controls how the site appears in Google search results
          # and in the browser tab. Not visible on the page itself.
          # ──────────────────────────────────────────────────────

          - label: "Page Title"
            name: "meta_title"
            widget: "string"
            hint: "Shown in the browser tab and Google results. Keep under 60 characters."

          - label: "Meta Description"
            name: "meta_description"
            widget: "text"
            hint: "Shown under the link in Google results. Keep under 160 characters."


          # ── NAVIGATION ────────────────────────────────────────
          # The link labels in the top nav bar.
          # These should match the headings of their sections so
          # visitors know where each link leads.
          # ──────────────────────────────────────────────────────

          - label: "Nav: About Link"
            name: "nav_about"
            widget: "string"
            hint: "Label for the About link in the top navigation bar."
            default: "About"

          - label: "Nav: What We Offer Link"
            name: "nav_offer"
            widget: "string"
            hint: "Label for the What We Offer link in the top navigation bar."
            default: "What We Offer"

          - label: "Nav: Who We Help Link"
            name: "nav_help"
            widget: "string"
            hint: "Label for the Who We Help link in the top navigation bar."
            default: "Who We Help"

          - label: "Nav: Contact Link"
            name: "nav_contact"
            widget: "string"
            hint: "Label for the Contact link in the top navigation bar."
            default: "Contact"


          # ── HERO ──────────────────────────────────────────────
          # The first section visitors see — the big heading area.
          # The main heading 'Every student can thrive.' is part
          # of the site design and is not editable here.
          # ──────────────────────────────────────────────────────

          - label: "Hero: Tagline"
            name: "hero_tagline"
            widget: "string"
            hint: "The sentence shown under 'Every student can thrive.'"

          - label: "Hero: Image"
            name: "hero_image"
            widget: "image"
            required: false
            hint: "Optional. If uploaded, replaces the animated blob graphic. Leave blank to keep the blob."


          # ── ABOUT ─────────────────────────────────────────────
          # Two-column section: text and paragraphs on the left,
          # value cards on the right.
          # ──────────────────────────────────────────────────────

          - label: "About: Section Label"
            name: "section_label_about"
            widget: "string"
            hint: "Small ALL-CAPS label shown above the section heading (e.g. 'About us')."
            default: "About us"

          - label: "About: Heading"
            name: "about_heading"
            widget: "string"
            hint: "Main heading for the About section."

          - label: "About: Paragraph 1"
            name: "about_p1"
            widget: "text"
            hint: "First paragraph describing the studio."

          - label: "About: Paragraph 2"
            name: "about_p2"
            widget: "text"
            hint: "Second paragraph — approach and philosophy."

          - label: "About: Miss Maria Bio"
            name: "about_bio"
            widget: "text"
            required: false
            hint: "Optional extra paragraph about Miss Maria personally. Leave blank to hide."

          - label: "About: Photo"
            name: "about_image"
            widget: "image"
            required: false
            hint: "Optional photo of Miss Maria or the studio. Leave blank to hide."

          # "list" widget creates a repeatable set of fields.
          # Cards can be added, removed, and reordered freely
          # in the CMS without touching any code.
          - label: "About: Value Cards"
            name: "value_cards"
            widget: "list"
            hint: "The cards on the right side of the About section (e.g. Patient & Personalized). Add, remove, or reorder freely."
            fields:
              - label: "Icon (emoji)"
                name: "icon"
                widget: "string"
                hint: "Paste a single emoji e.g. 🌱"
              - label: "Heading"
                name: "heading"
                widget: "string"
              - label: "Description"
                name: "description"
                widget: "text"


          # ── WHAT WE OFFER ─────────────────────────────────────
          # Grid of subject cards showing what the studio teaches.
          # ──────────────────────────────────────────────────────

          - label: "Offer: Section Label"
            name: "section_label_offer"
            widget: "string"
            hint: "Small ALL-CAPS label shown above the section heading (e.g. 'What we offer')."
            default: "What we offer"

          - label: "Offer: Heading"
            name: "offer_heading"
            widget: "string"

          - label: "Offer: Intro Paragraph"
            name: "offer_intro"
            widget: "text"
            hint: "Sentence or two introducing the subjects offered."

          - label: "Offer: Subject Cards"
            name: "subject_cards"
            widget: "list"
            hint: "The subject cards in the grid (e.g. Math, Reading). Add, remove, or reorder freely."
            fields:
              - label: "Icon (emoji)"
                name: "icon"
                widget: "string"
                hint: "Paste a single emoji e.g. 📖"
              - label: "Subject Name"
                name: "heading"
                widget: "string"
              - label: "Description"
                name: "description"
                widget: "text"

          - label: "Offer: Services Note"
            name: "services_note"
            widget: "text"
            required: false
            hint: "Optional note shown below the subject grid — e.g. pricing or scheduling info. Leave blank to hide."


          # ── WHO WE HELP ───────────────────────────────────────
          # Two grade band cards side by side.
          # Each card's label, grade range, and description are
          # all independently editable — so you can rename or
          # expand to different grade ranges if needed.
          # ──────────────────────────────────────────────────────

          - label: "Help: Section Label"
            name: "section_label_help"
            widget: "string"
            hint: "Small ALL-CAPS label shown above the section heading (e.g. 'Who we help')."
            default: "Who we help"

          - label: "Help: Heading"
            name: "help_heading"
            widget: "string"

          - label: "Help: Intro Paragraph"
            name: "help_intro"
            widget: "text"

          - label: "Help: Elementary — Grade Range"
            name: "elementary_range"
            widget: "string"
            hint: "The large range shown at the top of the card, e.g. 'K – 5'."
            default: "K – 5"

          - label: "Help: Elementary — Card Label"
            name: "elementary_label"
            widget: "string"
            hint: "The small label under the grade range, e.g. 'Elementary School'."
            default: "Elementary School"

          - label: "Help: Elementary — Description"
            name: "elementary_description"
            widget: "text"
            hint: "Short description shown inside the elementary card."

          - label: "Help: Middle School — Grade Range"
            name: "middle_range"
            widget: "string"
            hint: "The large range shown at the top of the card, e.g. '6 – 8'."
            default: "6 – 8"

          - label: "Help: Middle School — Card Label"
            name: "middle_label"
            widget: "string"
            hint: "The small label under the grade range, e.g. 'Middle School'."
            default: "Middle School"

          - label: "Help: Middle School — Description"
            name: "middle_description"
            widget: "text"
            hint: "Short description shown inside the middle school card."


          # ── CONTACT ───────────────────────────────────────────
          # Three contact cards: phone, email, address.
          # Phone and email render as clickable links automatically.
          # ──────────────────────────────────────────────────────

          - label: "Contact: Section Label"
            name: "section_label_contact"
            widget: "string"
            hint: "Small ALL-CAPS label shown above the section heading (e.g. 'Get in touch')."
            default: "Get in touch"

          - label: "Contact: Heading"
            name: "contact_heading"
            widget: "string"

          - label: "Contact: Intro Paragraph"
            name: "contact_intro"
            widget: "text"

          - label: "Phone Number"
            name: "phone"
            widget: "string"
            hint: "Format: (845) 661-8967 — used in the contact card and as a tap-to-call link."

          - label: "Email Address"
            name: "email"
            widget: "string"
            hint: "Used in the contact card, the email link, and the footer."

          - label: "Address"
            name: "address"
            widget: "string"
            hint: "Use <br> between street and city/state for a line break — e.g. 1-3 Henry W Dubois Dr<br>New Paltz, NY 12561"

          - label: "Address: Google Maps Link"
            name: "address_map_link"
            widget: "string"
            required: false
            hint: "Paste a full Google Maps URL. When provided, the address card becomes a clickable link. Leave blank for plain text."

          - label: "Hours of Operation"
            name: "hours"
            widget: "string"
            required: false
            hint: "e.g. Mon–Fri 3–7pm · Sat 10am–2pm. Shown below the contact cards. Leave blank to hide."


          # ── FOOTER ────────────────────────────────────────────
          # The bottom bar of the page.
          # The studio name and location are part of the design
          # and are not editable here.
          # ──────────────────────────────────────────────────────

          - label: "Footer: Copyright Year"
            name: "footer_year"
            widget: "string"
            hint: "Update each January. Currently: 2026."
